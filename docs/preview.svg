<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#080b14"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0" r="0.9">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="440" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="440" rx="20" fill="url(#glow)"/>

  <!-- logo + wordmark -->
  <g transform="translate(56,52)">
    <rect width="44" height="44" rx="12" fill="url(#brand)"/>
    <g stroke="#06121f" stroke-width="2.4" stroke-linecap="round" fill="none" transform="translate(10,10)">
      <path d="M0 14c6 0 6-4 12-4s6 4 12 4M0 19c6 0 6-4 12-4s6 4 12 4M0 9c6 0 6-4 12-4s6 4 12 4"/>
    </g>
    <text x="58" y="22" fill="#e8edf6" font-size="24" font-weight="700">AeroSense</text>
    <text x="58" y="40" fill="#6b7894" font-size="13">air intelligence · SmartScape 2026 · Track 2</text>
  </g>

  <!-- headline -->
  <text x="56" y="170" fill="#e8edf6" font-size="46" font-weight="700">Breathe with <tspan fill="url(#brand)">foresight</tspan>,</text>
  <text x="56" y="222" fill="#e8edf6" font-size="46" font-weight="700">not hindsight.</text>
  <text x="56" y="262" fill="#9fadc4" font-size="17">AI air-quality forecasting &amp; citizen health advisory for cities.</text>

  <!-- stat chips -->
  <g font-size="15" fill="#cdd7e6">
    <g transform="translate(56,300)">
      <rect width="150" height="58" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="16" y="26" fill="#38bdf8" font-size="22" font-weight="700">R² 0.95</text>
      <text x="16" y="46" fill="#6b7894" font-size="12">next-hour forecast</text>
    </g>
    <g transform="translate(222,300)">
      <rect width="150" height="58" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="16" y="26" fill="#34d399" font-size="22" font-weight="700">80%</text>
      <text x="16" y="46" fill="#6b7894" font-size="12">AQI accuracy</text>
    </g>
    <g transform="translate(388,300)">
      <rect width="170" height="58" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="16" y="26" fill="#e8edf6" font-size="22" font-weight="700">41k</text>
      <text x="16" y="46" fill="#6b7894" font-size="12">real hourly records</text>
    </g>
  </g>

  <!-- forecast mini chart -->
  <g transform="translate(640,70)">
    <rect width="504" height="300" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="22" y="34" fill="#e8edf6" font-size="15" font-weight="600">12-hour AI forecast</text>
    <text x="22" y="54" fill="#6b7894" font-size="12">Beijing · PM2.5 µg/m³</text>
    <!-- category bands -->
    <g opacity="0.10">
      <rect x="22" y="200" width="460" height="68" fill="#34d399"/>
      <rect x="22" y="150" width="460" height="50" fill="#facc15"/>
      <rect x="22" y="110" width="460" height="40" fill="#fb923c"/>
      <rect x="22" y="74"  width="460" height="36" fill="#f87171"/>
    </g>
    <!-- observed history -->
    <path d="M22 232 L60 226 L98 236 L136 214 L174 200 L212 196 L250 168 L288 176 L326 150 L344 128"
          fill="none" stroke="#38bdf8" stroke-width="2.6"/>
    <path d="M22 232 L60 226 L98 236 L136 214 L174 200 L212 196 L250 168 L288 176 L326 150 L344 128 L344 268 L22 268 Z"
          fill="url(#fill)" opacity="0.5"/>
    <!-- divider -->
    <line x1="344" y1="74" x2="344" y2="268" stroke="#ffffff" stroke-opacity="0.18" stroke-dasharray="4 4"/>
    <!-- forecast -->
    <path d="M344 128 L372 134 L400 142 L428 150 L456 152 L482 150"
          fill="none" stroke="#818cf8" stroke-width="2.6" stroke-dasharray="6 4"/>
    <!-- actual dotted -->
    <path d="M344 128 L372 132 L400 140 L428 146 L456 150 L482 148"
          fill="none" stroke="#6b7894" stroke-width="1.6" stroke-dasharray="2 3"/>
    <!-- legend -->
    <g font-size="11" fill="#9fadc4" transform="translate(22,288)">
      <line x1="0" y1="-4" x2="18" y2="-4" stroke="#38bdf8" stroke-width="2.4"/><text x="24" y="0">history</text>
      <line x1="86" y1="-4" x2="104" y2="-4" stroke="#818cf8" stroke-width="2.4" stroke-dasharray="5 3"/><text x="110" y="0">AI forecast</text>
      <line x1="206" y1="-4" x2="224" y2="-4" stroke="#6b7894" stroke-width="1.6" stroke-dasharray="2 3"/><text x="230" y="0">actual</text>
    </g>
  </g>
</svg>
